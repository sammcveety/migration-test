<html lang="en"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/img/favicon.ico">
    <title>Doctor Home</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/style.css">
    <!--[if lt IE 9]>
		<script src="/assets/js/html5shiv.min.js"></script>
		<script src="/assets/js/respond.min.js"></script>
	<![endif]-->
</head>
<body>
    <div class="container">
        <div class="main-body">
            <div class="row">
                <div class="col-lg-4">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex flex-column align-items-center text-center">
                                <img src="https://bootdey.com/img/Content/avatar/avatar6.png" alt="Admin" class="rounded-circle p-1 bg-primary" width="110">
                                <div class="mt-3">
                                    <h4>Dr. Sarah Chen</h4>
                                    <p class="text-secondary mb-1">Cardiologist</p>
                                    <p class="text-muted font-size-sm">8 slots available</p>
                                    <a href="/logout"><button class="btn btn-outline-primary">Log Out</button></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-8">
                    <form action="/doctorhome" method="post"> 
                        <div class="card">
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-sm-3">
                                        <h6 class="mb-0">Full Name</h6>
                                    </div>
                                    <div class="col-sm-9 text-secondary">
                                        <input type="text" name="staff_name" class="form-control" value="Dr. Sarah Chen" style="">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-sm-3">
                                        <h6 class="mb-0">Occupation</h6>
                                    </div>
                                    <div class="col-sm-9 text-secondary">
                                        <input type="text" name="occupation" class="form-control" value="Cardiologist" style="">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-sm-3">
                                        <h6 class="mb-0">Email</h6>
                                    </div>
                                    <div class="col-sm-9 text-secondary">
                                        <input type="text" name="email" class="form-control" value="chen@hospital.com" style="">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-sm-3">
                                        <h6 class="mb-0">Date of birth</h6>
                                        <input type="text" class="form-control" value="Thu Jun 12 1975 00:00:00 GMT+0000 (Coordinated Universal Time)" style="">
                                    </div>
                                    <div class="col-sm-9 text-secondary">
                                        <input type="date" name="dob" class="form-control" style="">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-sm-3">
                                        <h6 class="mb-0">Leave Status</h6>
                                    </div>
                                    <div class="col-sm-9 text-secondary">
                                        <input type="checkbox" name="onleave" id="onleave" style="">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-sm-9 text-secondary">
                                        <input type="submit" class="btn btn-primary px-4" value="Save Changes" style="">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="d-flex align-items-center mb-3">Current Appointments</h5>
                                    <table>
                                        <tbody>
                                            
                                                <tr>
                                                    <td>PK - </td>
                                                    <td>General Checkup</td>
                                                    <td></td>
                                                    <td>Mon Jan 15 2024 00:00:00 GMT+0000 (Coordinated Universal Time)</td>
                                                </tr>
                                            
                                                <tr>
                                                    <td>PK - </td>
                                                    <td>Annual Physical</td>
                                                    <td></td>
                                                    <td>Sat Feb 10 2024 00:00:00 GMT+0000 (Coordinated Universal Time)</td>
                                                </tr>
                                            
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/jquery-3.2.1.min.js"></script>
	<script src="assets/js/popper.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/app.js"></script>

</body></html>
