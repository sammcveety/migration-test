<html lang="en"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" type="image/x-icon" href="/assets/img/favicon.ico">
    <title>Appointment</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/assets/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/style.css">
    <!--[if lt IE 9]>
		<script src="/assets/js/html5shiv.min.js"></script>
		<script src="/assets/js/respond.min.js"></script>
	<![endif]-->
</head>
<body>
    <form action="/patienthome/edit_apt/100" method="post">
        <div class="form-group">
          <label for="exampleInputEmail1">Appointment title</label>
          <input type="text" class="form-control" name="title" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="General Checkup" style="">
        </div>
        <div class="form-group">
          <label for="apt_date">Appointment Date</label>
          <input type="date" name="apt_date" class="form-control" id="exampleInputPassword1" style="">
        </div>
        <div class="form-group">
            <label for="exampleInputPassword1">Remarks</label>
            <input type="text" name="remarks" class="form-control" id="exampleInputPassword1" placeholder="Any comments..." style="">
        </div>
        <div class="form-group">
            <label for="feedback">Doctor rating</label>
            <select class="" name="rating">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
        <div class="form-group form-check">
          <input type="checkbox" name="complete" class="form-check-input" id="exampleCheck1" style="">
          <label class="form-check-label" for="complete">Mark as complete</label>
        </div>
        <button type="submit" class="btn btn-primary">Update Appointment</button>
      </form>

</body></html>
